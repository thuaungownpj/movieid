<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Device Manager | Secured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b1120;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .list-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .list-card:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.05);
        }
        .used-state {
            opacity: 0.5;
            filter: grayscale(80%);
            pointer-events: none; 
        }
        #toast {
            visibility: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }
        /* Lock Screen Transition */
        #pin-overlay {
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="pin-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#0b1120] bg-opacity-95 backdrop-blur-xl">
        <div class="glass-card p-8 rounded-3xl max-w-sm w-full mx-4 text-center border border-cyan-500/20 shadow-2xl shadow-cyan-900/50">
            <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-5 border border-slate-700 shadow-inner">
                <i class="fa-solid fa-shield-halved text-3xl text-cyan-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2 tracking-wide">Access Restricted</h2>
            <p class="text-slate-400 text-sm mb-6">Enter the 6-digit security PIN to continue.</p>
            
            <input type="password" id="pin-input" maxlength="6" inputmode="numeric" 
                   class="w-full bg-slate-900/80 border border-slate-700 text-cyan-400 text-center text-3xl tracking-[0.4em] font-mono py-4 px-3 rounded-xl focus:outline-none focus:border-cyan-500 transition-colors mb-2 shadow-inner" 
                   placeholder="••••••" autofocus>
            
            <p id="pin-error" class="text-rose-500 text-sm font-semibold mb-4 h-5 opacity-0 transition-opacity">Incorrect PIN. Please try again.</p>
            
            <button id="unlock-btn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-cyan-500/25 active:scale-[0.98]">
                <i class="fa-solid fa-unlock-keyhole mr-2"></i> Unlock System
            </button>
        </div>
    </div>


    <div id="main-app" class="hidden opacity-0 transition-opacity duration-500">
        <div class="max-w-5xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold text-white tracking-wide flex items-center gap-3">
                    <i class="fa-solid fa-server text-cyan-400"></i> Core Devices
                </h1>
                <p class="text-slate-400 mt-1 text-sm">Real-time sync across all computers.</p>
            </div>
            
            <div class="inline-flex items-center gap-2 bg-slate-800/80 px-5 py-2.5 rounded-xl border border-slate-700 shadow-lg shadow-black/50">
                <i class="fa-regular fa-clock text-cyan-400 fa-spin-pulse"></i>
                <span class="text-slate-300 font-medium">MMT: </span>
                <span id="mmt-clock" class="text-cyan-400 font-bold tracking-widest">00:00:00</span>
            </div>
        </div>

        <div id="devices-container" class="max-w-5xl mx-auto flex flex-col gap-4 pb-20">
            <div id="loading" class="text-center py-10 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-cyan-400 mb-3"></i>
                <p>Connecting to Database...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-cyan-900 text-cyan-100 px-6 py-3 rounded-xl border border-cyan-500/50 shadow-2xl flex items-center gap-3 z-50">
        <i class="fa-solid fa-check-circle text-cyan-400 text-lg"></i>
        <span id="toast-message" class="font-medium tracking-wide">Copied!</span>
    </div>

    <script type="module">
        // Import Firebase Functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";


        // ==========================================
        // 🔐 လုံခြုံရေး PIN စနစ် (Security PIN Logic)
        // ==========================================
        const APP_PIN = "171075"; // <--- ဒီနေရာမှာ အစ်ကိုလိုချင်တဲ့ PIN ကို ပြင်နိုင်ပါတယ်
        
        const pinOverlay = document.getElementById('pin-overlay');
        const mainApp = document.getElementById('main-app');
        const pinInput = document.getElementById('pin-input');
        const pinError = document.getElementById('pin-error');
        const unlockBtn = document.getElementById('unlock-btn');

        // Check if already unlocked in this session
        if (sessionStorage.getItem('isUnlocked') === 'true') {
            showMainApp();
        }

        function showMainApp() {
            pinOverlay.style.visibility = 'hidden';
            pinOverlay.style.opacity = '0';
            mainApp.classList.remove('hidden');
            setTimeout(() => {
                mainApp.classList.remove('opacity-0');
            }, 100);
        }

        function verifyPIN() {
            const enteredPIN = pinInput.value.trim();
            if (enteredPIN === APP_PIN) {
                // PIN မှန်ကန်ပါက
                sessionStorage.setItem('isUnlocked', 'true');
                showMainApp();
            } else {
                // PIN မှားယွင်းပါက
                pinError.style.opacity = '1';
                pinInput.value = '';
                pinInput.classList.add('border-rose-500');
                setTimeout(() => {
                    pinError.style.opacity = '0';
                    pinInput.classList.remove('border-rose-500');
                }, 2000);
            }
        }

        // ခလုတ်နှိပ်သည့်အခါ
        unlockBtn.addEventListener('click', verifyPIN);
        
        // Enter ခေါက်သည့်အခါ
        pinInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyPIN();
        });


        // ==========================================================
        // ⭐️ Device အသစ်များကို ဒီနေရာတွင် အလွယ်တကူ ထပ်တိုးနိုင်ပါပြီ ⭐️
        // ==========================================================
        const DEVICE_LIST = [
            { no: 1, id: "4809e9cb-63c9-4706-924e-0763fe6c4d22", pin: "625017" },
            { no: 2, id: "f446b35d-ebe0-44b2-98e6-1c8b9a656868", pin: "951769" },
            { no: 3, id: "43e69870-9b7f-44b9-bd93-0197c8d54d9a", pin: "311096" },
            { no: 4, id: "f446b35d-ebe0-44b2-98e6-1c8b9a656868", pin: "951769" },
            { no: 5, id: "ea02cab9-6166-4297-92d0-da3801233a7d", pin: "887393" },
            { no: 6, id: "3490bc64-7be0-45ad-9902-30466c37737a", pin: "143214" },
            { no: 7, id: "cbe1db10-1e7f-4f97-afa1-a58f7b3c4cbe", pin: "294469" },
            { no: 8, id: "f70b3bc9-35cc-4ff9-8205-a1e37e836642", pin: "296884" },
            { no: 9, id: "018d2907-b5b9-49bc-a637-cf69a371307d", pin: "696611" },
            { no: 10, id: "c461cd75-5337-4996-8b81-5a1bc489a0fa", pin: "123009" },
            { no: 11, id: "24220e80-903f-47e6-8819-6f0e3efd8037", pin: "296524" },
            { no: 12, id: "4280dec9-fc0a-4d1f-89bc-107d31ab3c5c", pin: "928587" },
            { no: 13, id: "68f2ba5c-02b3-4870-a30d-4aa503c59663", pin: "310087" },
            { no: 14, id: "afa22470-0cf8-4f19-8d34-c0e0f3e1dca2", pin: "525037" },
            { no: 15, id: "36737ed6-2b2b-46ee-94b7-11563889f8ac", pin: "452985" },
            { no: 16, id: "f786ba30-7634-4c18-8a1e-edbe7c4a6b44", pin: "284374" },
            { no: 17, id: "e38f135e-962a-4251-b388-679b9bfb00dc", pin: "219918" },
            { no: 18, id: "db599c46-8741-4180-96cc-c91192c915a0", pin: "757640" },
            { no: 19, id: "f8130851-2017-4377-8162-ee24a29f1e2c", pin: "952121" },
            { no: 20, id: "e4fd9be8-2a6a-42c2-aa20-df41547a1a3f", pin: "932561" },
            { no: 21, id: "fba6e208-78db-4194-96ef-a2eff3357ee3", pin: "246766" },
            { no: 22, id: "07504f89-28ed-48ab-be22-c8b1604cbd83", pin: "150425" },
            { no: 23, id: "fa95097a-b03d-41cb-aeb1-b30d746cb20e", pin: "334569" },
            { no: 24, id: "36737ed6-2b2b-46ee-94b7-11563889f8ac", pin: "452985" },
            { no: 25, id: "9fe73633-f296-4b29-a36e-6d236ac484ea", pin: "217876" }
        ];

        // ==========================================
        // Firebase Configuration
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCwL-Q4qNv5mlonWNn4f7I83iN8dXEPvc0",
            authDomain: "movie-id-16597.firebaseapp.com",
            databaseURL: "https://movie-id-16597-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "movie-id-16597",
            storageBucket: "movie-id-16597.firebasestorage.app",
            messagingSenderId: "425793048957",
            appId: "1:425793048957:web:b0245440dbe304ce4a7c14",
            measurementId: "G-ED5BPE39LG"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);


        // ==========================================
        // MMT Clock & Smart Midnight Reset
        // ==========================================
        function getMMTDateString() {
            return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Yangon" })).toDateString();
        }

        function updateClock() {
            const mmtTime = new Date().toLocaleTimeString("en-US", { timeZone: "Asia/Yangon", hour12: true });
            document.getElementById('mmt-clock').innerText = mmtTime;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const systemDateRef = ref(database, 'system/lastDate');
        const stateRef = ref(database, 'deviceState');

        // Check for new day & Auto-reset
        onValue(systemDateRef, (snapshot) => {
            const dbDate = snapshot.val();
            const currentDate = getMMTDateString();

            if (dbDate !== currentDate) {
                const freshState = {};
                DEVICE_LIST.forEach(d => {
                    freshState[d.no] = { id: false, pin: false };
                });
                
                update(ref(database, 'system'), { lastDate: currentDate });
                set(stateRef, freshState);
            }
        });


        // ==========================================
        // Real-time UI Render (Auto-Detects New Devices)
        // ==========================================
        let currentState = {};

        onValue(stateRef, (snapshot) => {
            if (snapshot.exists()) {
                currentState = snapshot.val();
            } else {
                currentState = {};
            }
            renderList();
        });

        function renderList() {
            const container = document.getElementById('devices-container');
            container.innerHTML = ''; 

            DEVICE_LIST.forEach(device => {
                const state = currentState[device.no] || { id: false, pin: false };
                const isUsed = state.id && state.pin;

                const statusIcon = isUsed 
                    ? `<div class="bg-rose-500/20 text-rose-500 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 border border-rose-500/30">
                        <i class="fa-solid fa-lock"></i> USED
                       </div>`
                    : `<div class="bg-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 border border-emerald-500/30">
                        <i class="fa-solid fa-satellite-dish fa-fade"></i> ACTIVE
                       </div>`;

                const cardHTML = `
                    <div class="list-card w-full flex flex-col lg:flex-row items-center gap-4 lg:gap-6 p-4 md:p-5 rounded-2xl ${isUsed ? 'used-state' : 'border-l-4 border-l-cyan-500'}">
                        
                        <div class="flex items-center justify-between lg:justify-start w-full lg:w-1/4 gap-4">
                            <div class="flex items-center gap-4">
                                <div class="h-12 w-12 rounded-xl bg-slate-800/80 flex items-center justify-center border border-slate-700 shadow-inner">
                                   <i class="fa-solid fa-microchip text-xl text-${isUsed ? 'rose' : 'cyan'}-400"></i>
                                </div>
                                <div>
                                   <h3 class="font-bold text-lg text-white">Device ${device.no}</h3>
                                </div>
                            </div>
                            <div class="lg:hidden block">${statusIcon}</div>
                        </div>
                        
                        <div class="hidden lg:block">${statusIcon}</div>

                        <div class="flex flex-col sm:flex-row w-full lg:flex-1 gap-3">
                            <div class="flex-1 bg-slate-900/50 p-2 pl-4 rounded-xl flex justify-between items-center border border-slate-700/50 hover:border-slate-600 transition-colors">
                                <div class="truncate mr-3">
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">ID Number</p>
                                    <p class="text-sm text-slate-200 font-mono truncate">${device.id}</p>
                                </div>
                                <button onclick="window.copyData(${device.no}, 'id', '${device.id}')" 
                                        class="shrink-0 h-10 w-12 rounded-lg ${state.id ? 'bg-emerald-500/20 text-emerald-400' : 'bg-blue-600 hover:bg-blue-500 text-white'} flex items-center justify-center transition-all active:scale-95">
                                    <i class="fa-solid ${state.id ? 'fa-check' : 'fa-copy'}"></i>
                                </button>
                            </div>

                            <div class="sm:w-48 bg-slate-900/50 p-2 pl-4 rounded-xl flex justify-between items-center border border-slate-700/50 hover:border-slate-600 transition-colors">
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">Secret PIN</p>
                                    <p class="text-base text-white font-mono font-bold tracking-widest">${device.pin}</p>
                                </div>
                                <button onclick="window.copyData(${device.no}, 'pin', '${device.pin}')" 
                                        class="shrink-0 h-10 w-12 rounded-lg ${state.pin ? 'bg-emerald-500/20 text-emerald-400' : 'bg-cyan-600 hover:bg-cyan-500 text-white'} flex items-center justify-center transition-all active:scale-95">
                                    <i class="fa-solid ${state.pin ? 'fa-check' : 'fa-copy'}"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }


        // ==========================================
        // Copy & Database Update
        // ==========================================
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.copyData = function(deviceNo, type, text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`Copied ${type.toUpperCase()} for Device ${deviceNo}`);
                
                update(ref(database, `deviceState/${deviceNo}`), {
                    [type]: true
                });
            }).catch(err => console.error('Copy failed:', err));
        }

    </script>
</body>
</html>
